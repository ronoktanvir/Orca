# Orca — default config. Every tuning knob lives here (ORCA_master_build_spec §15).
# This file's structure is part of the frozen handoff (workflow plan §2.4).

run:
  seed: "A"               # which seed layout to run (train pool {A,T2,T3})
  n_episodes: 1           # Phase 0: a single end-to-end episode
  t_max: 120              # episode cap — lowered for early streams to keep LLM
                          # episodes short/cheap (§8); raise as agents get competent
  day_length: 100         # §15 night-danger cadence (time_of_day in obs)
  stop_at_milestone: "iron"  # Phase 0 shallow target; null => run to t_max
  message_window: 8       # §5.2 recent_messages K
  single_agent_oracle: true  # Phase 0 placeholder agent (scripted shallow oracle)
  worker_concurrency: 0   # 0 = AUTO: full team runs one worker call per agent
                          # concurrently (asyncio); single-agent oracle stays
                          # sequential. Set a positive int to pin it.

agents:
  temperature: 0.2        # §15 worker temperature (LLM workers, Stream 2)

llm:                      # swappable model config (§11); keys come from .env
  provider: "wandb_inference"   # PRIMARY: GLM-5.1 via W&B Inference (both roles)
  fallback_provider: "openai"   # BACKUP: OpenAI when a primary call fails (null disables)
  # W&B Inference (GLM-5.1) — primary, billed to W&B credits ($50)
  wandb_inference_base_url: "https://api.inference.wandb.ai/v1"
  wandb_inference_model: "zai-org/GLM-5.1"   # primary worker+Orca model (confirmed live)
  # wandb_inference_orca_model: null         # unset => Orca also on GLM-5.1
  # OpenAI fallback models (used only when GLM is unavailable)
  worker_model: "gpt-5-mini"   # 4 workers — cheap/fast, high call volume
  orca_model: "gpt-5"          # Orca — strong reasoning, 1 call/episode
  temperature: 0.2
  openai_base_url: null

reward:
  weights:                # §7.2 / §15 — kept << a frontier step
    deaths: 0.02
    invalid: 0.05
    idle: 0.05

bandit:
  epsilon: 0.2            # §15 ε-greedy (Orca delegation bandit, Stream 3)

phases:
  phase0_length: 15       # §15 bandit warmup, cards frozen
  memory_cap: 8           # §15 heuristics/agent

seeds:
  train: ["A", "T2", "T3"]   # §15 rotate (D7)
  heldout: ["B", "C"]        # §15 eval only, never trained on (D7)

telemetry:
  mode: "auto"            # auto | weave | local | off  (auto => weave iff creds)
  entity: "ronoktanvir-university-of-california-berkeley"  # W&B team; null => default
  project: "orca"
  run_dir: "runs"
